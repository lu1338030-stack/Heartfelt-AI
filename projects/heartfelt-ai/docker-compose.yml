# Heartfelt AI 本地开发基础设施
# 启动：docker compose up -d
# 停止：docker compose down
# 清库：docker compose down -v

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: heartfelt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: heartfelt
      POSTGRES_PASSWORD: heartfelt_dev
      POSTGRES_DB: heartfelt
    ports:
      - "5432:5432"
    # 若 host 5432 被占用导致端口映射失败，可改 "5433:5432" 并同步改 backend/.env 的 POSTGRES_PORT
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heartfelt"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: heartfelt-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: heartfelt-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: heartfelt
      MINIO_ROOT_PASSWORD: heartfelt_dev
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  minio_data:
